services:
  - type: web
    name: mock-scene-editing-backend
    env: python
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FAL_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
